<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced Media Player Pro</title>

<style>
:root {
    --bg: #f2f2f2;
    --card: #ffffff;
    --text: #111;
    --accent: #4a90e2;
}

body.dark {
    --bg: #121212;
    --card: #1e1e1e;
    --text: #eee;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

video, img {
    width: 70%;
    max-width: 900px;
    border-radius: 10px;
    background: black;
}

/* TIMELINE */
.timeline {
    width: 70%;
    max-width: 900px;
    height: 10px;
    background: #444;
    margin-top: 10px;
    border-radius: 5px;
    position: relative;
    cursor: pointer;
}

.progress {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 5px;
}

/* CONTROLS */
.controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
    justify-content: center;
}

button, input {
    padding: 8px;
}

/* QUEUE */
#queue {
    margin-top: 20px;
    width: 80%;
    max-width: 500px;
    background: var(--card);
    padding: 10px;
    border-radius: 10px;
}

.item {
    padding: 6px;
    border-bottom: 1px solid #555;
    cursor: pointer;
}

.active {
    background: var(--accent);
    color: white;
}

/* SCRUB PREVIEW */
#scrubPreview {
    position: absolute;
    display: none;
    pointer-events: none;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 6px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
    z-index: 10;
}
</style>
</head>

<body>

<h2>Advanced Media Player</h2>

<input type="file" id="fileInput" accept="video/*,image/*" multiple>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<video id="video"></video>
<img id="image" style="display:none;">

<!-- TIMELINE -->
<div class="timeline" id="timeline">
    <div class="progress" id="progress"></div>
</div>

<!-- CONTROLS -->
<div class="controls">
    <button onclick="togglePlay()">Play/Pause</button>
    <button onclick="skip(-10)">⏪ 10s</button>
    <button onclick="skip(10)">10s ⏩</button>
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
</div>

<div id="queue"></div>

<!-- GIF -->
<h3>GIF Tool</h3>
<button onclick="setStart()">Set Start</button>
<button onclick="setEnd()">Set End</button>
<button onclick="previewGif()">Preview GIF</button>
<button onclick="exportGif()">Export GIF</button>

<p id="gifInfo">Start: 0 | End: 0</p>

<canvas id="gifCanvas" width="480" height="270" style="display:none;"></canvas>
<img id="gifPreview" style="max-width:300px; display:none; border-radius:10px;">

<!-- SCRUB PREVIEW -->
<div id="scrubPreview">
    <div id="scrubTime">0:00</div>
    <canvas id="scrubCanvas" width="160" height="90"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

<script>
const fileInput = document.getElementById("fileInput");
const video = document.getElementById("video");
const img = document.getElementById("image");
const queueDiv = document.getElementById("queue");
const timeline = document.getElementById("timeline");
const progress = document.getElementById("progress");

const scrubPreview = document.getElementById("scrubPreview");
const scrubTime = document.getElementById("scrubTime");
const scrubCanvas = document.getElementById("scrubCanvas");
const scrubCtx = scrubCanvas.getContext("2d");

const gifCanvas = document.getElementById("gifCanvas");
const gifCtx = gifCanvas.getContext("2d");
const gifPreview = document.getElementById("gifPreview");

let queue = [];
let index = -1;

let gifStart = 0;
let gifEnd = 0;

let isScrubbing = false;
let scrubLock = false;

/* ---------------- QUEUE ---------------- */
fileInput.addEventListener("change", e => {
    for (const f of e.target.files) {
        queue.push({
            name: f.name,
            type: f.type,
            url: URL.createObjectURL(f)
        });
    }
    renderQueue();
    if (index === -1) play(0);
});

function play(i) {
    if (!queue[i]) return;
    index = i;

    video.pause();
    video.style.display = "none";
    img.style.display = "none";

    const item = queue[i];

    if (item.type.startsWith("image")) {
        img.src = item.url;
        img.style.display = "block";
    } else {
        video.src = item.url;
        video.style.display = "block";
        video.load();
        video.play();
    }

    renderQueue();
}

function next() { if (index + 1 < queue.length) play(index + 1); }
function prev() { if (index - 1 >= 0) play(index - 1); }

/* ---------------- CONTROLS ---------------- */
function togglePlay() {
    if (video.paused) video.play();
    else video.pause();
}

function skip(sec) {
    video.currentTime += sec;
}

/* ---------------- TIMELINE ---------------- */
video.addEventListener("timeupdate", () => {
    if (!video.duration) return;
    progress.style.width = (video.currentTime / video.duration) * 100 + "%";
});

function getTimeFromX(e) {
    const rect = timeline.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    return Math.max(0, Math.min(percent * video.duration, video.duration));
}

timeline.addEventListener("mousedown", (e) => {
    isScrubbing = true;
    video.pause();
    seek(e);
});

window.addEventListener("mousemove", (e) => {
    if (isScrubbing) seek(e);
    showScrub(e);
});

window.addEventListener("mouseup", () => {
    isScrubbing = false;
    scrubPreview.style.display = "none";
});

timeline.addEventListener("click", seek);

function seek(e) {
    if (!video.duration) return;
    video.currentTime = getTimeFromX(e);
}

/* ---------------- SCRUB PREVIEW ---------------- */
function showScrub(e) {
    if (!video.duration) return;

    const time = getTimeFromX(e);

    scrubPreview.style.display = "block";
    scrubPreview.style.left = e.pageX + 10 + "px";
    scrubPreview.style.top = e.pageY - 70 + "px";

    scrubTime.textContent = formatTime(time);

    if (!scrubLock) {
        scrubLock = true;

        const temp = document.createElement("video");
        temp.src = video.src;
        temp.currentTime = time;

        temp.addEventListener("seeked", () => {
            scrubCtx.drawImage(temp, 0, 0, 160, 90);
            scrubLock = false;
        });
    }
}

function formatTime(t) {
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60);
    return `${m}:${s.toString().padStart(2, "0")}`;
}

/* ---------------- QUEUE UI ---------------- */
function renderQueue() {
    queueDiv.innerHTML = "<h3>Queue</h3>";

    queue.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "item";
        if (i === index) div.classList.add("active");

        div.textContent = item.name;
        div.onclick = () => play(i);

        queueDiv.appendChild(div);
    });
}

/* ---------------- DARK MODE ---------------- */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* ---------------- GIF ---------------- */
function setStart() {
    gifStart = video.currentTime;
    updateGifInfo();
}

function setEnd() {
    gifEnd = video.currentTime;
    updateGifInfo();
}

function updateGifInfo() {
    document.getElementById("gifInfo").textContent =
        `Start: ${gifStart.toFixed(1)} | End: ${gifEnd.toFixed(1)}`;
}

function previewGif() {
    if (gifEnd <= gifStart) return alert("Set valid range");

    gifPreview.style.display = "block";
    let frames = [];

    video.pause();
    video.currentTime = gifStart;

    const step = 0.3;

    function capture() {
        if (video.currentTime >= gifEnd) {
            buildGif(frames);
            return;
        }

        gifCtx.drawImage(video, 0, 0, gifCanvas.width, gifCanvas.height);
        frames.push(gifCanvas.toDataURL("image/png"));

        video.currentTime += step;
        setTimeout(capture, 80);
    }

    capture();
}

function buildGif(frames) {
    const gif = new GIF({
        workers: 2,
        quality: 10,
        width: 480,
        height: 270
    });

    frames.forEach(f => {
        const img = new Image();
        img.src = f;
        gif.addFrame(img, { delay: 100 });
    });

    gif.on("finished", blob => {
        const url = URL.createObjectURL(blob);
        gifPreview.src = url;

        const a = document.createElement("a");
        a.href = url;
        a.download = "clip.gif";
        a.click();
    });

    gif.render();
}

function exportGif() {
    previewGif();
}
</script>

</body>
</html>
