<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local Media Player</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #111;
    --panel: #f2f2f2;
  }
  body.dark {
    --bg: #121212;
    --text: #f5f5f5;
    --panel: #1e1e1e;
  }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--panel);
    flex-wrap: wrap;
  }
  button, input {
    padding: 6px;
  }
  #container {
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  #frame {
    resize: both;
    overflow: auto;
    border: 2px solid #888;
    width: 700px;
    height: 400px;
    background: black;
    position: relative;
  }
  video, img, iframe {
    width: 100%;
    height: 100%;
  }
  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 10px;
  }
</style>
</head>
<body>

<header>
  <input type="file" id="fileInput" multiple />
  <input type="text" id="urlInput" placeholder="Paste video/image/YouTube URL" style="flex:1" />
  <button onclick="loadURL()">Load URL</button>
  <button onclick="toggleDark()">Dark Mode</button>
</header>

<div id="container">
  <div id="frame">
    <video id="video" controls style="display:none"></video>
    <img id="image" style="display:none" />
    <iframe id="yt" style="display:none" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<div id="controls">
  <button onclick="playPause()">Play/Pause</button>
  <button onclick="back10()">-10s</button>
  <button onclick="forward10()">+10s</button>
  <button onclick="downloadMedia()">Download</button>
</div>

<script>
let currentVideo = document.getElementById('video');
let currentImage = document.getElementById('image');
let yt = document.getElementById('yt');

function resetView() {
  currentVideo.style.display = 'none';
  currentImage.style.display = 'none';
  yt.style.display = 'none';
  currentVideo.pause();
  yt.src = '';
}

// File loader
 document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  resetView();
  const url = URL.createObjectURL(file);

  if (file.type.startsWith('video')) {
    currentVideo.src = url;
    currentVideo.style.display = 'block';
    currentVideo.play();
  } else if (file.type.startsWith('image')) {
    currentImage.src = url;
    currentImage.style.display = 'block';
  } else {
    alert('Unsupported file type');
  }
});

function loadURL() {
  const url = document.getElementById('urlInput').value;
  if (!url) return;

  resetView();

  if (url.includes('youtube.com') || url.includes('youtu.be')) {
    let videoId = '';
    if (url.includes('youtu.be')) {
      videoId = url.split('/').pop();
    } else {
      const u = new URL(url);
      videoId = u.searchParams.get('v');
    }
    yt.src = `https://www.youtube.com/embed/${videoId}`;
    yt.style.display = 'block';
  } else if (url.match(/\.(mp4|webm|ogg|mov)/i)) {
    currentVideo.src = url;
    currentVideo.style.display = 'block';
    currentVideo.play();
  } else if (url.match(/\.(png|jpg|jpeg|gif)/i)) {
    currentImage.src = url;
    currentImage.style.display = 'block';
  } else {
    alert('Unsupported URL');
  }
}

function playPause() {
  if (currentVideo.style.display === 'block') {
    if (currentVideo.paused) currentVideo.play();
    else currentVideo.pause();
  }
}

function back10() {
  if (currentVideo.style.display === 'block') {
    currentVideo.currentTime = Math.max(0, currentVideo.currentTime - 10);
  }
}

function forward10() {
  if (currentVideo.style.display === 'block') {
    currentVideo.currentTime += 10;
  }
}

function downloadMedia() {
  if (currentVideo.style.display === 'block') {
    const a = document.createElement('a');
    a.href = currentVideo.src;
    a.download = 'video';
    a.click();
  } else if (currentImage.style.display === 'block') {
    const a = document.createElement('a');
    a.href = currentImage.src;
    a.download = 'image';
    a.click();
  } else {
    alert('Nothing to download');
  }
}

function toggleDark() {
  document.body.classList.toggle('dark');
}
</script>

</body>
</html>
