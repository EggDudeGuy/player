<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local Media Player</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #111;
    --panel: #f2f2f2;
  }
  body.dark {
    --bg: #121212;
    --text: #f5f5f5;
    --panel: #1e1e1e;
  }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--panel);
    flex-wrap: wrap;
  }
  button, input {
    padding: 6px;
  }

  #container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    align-items: flex-start;
  }

  #frame {
    overflow: hidden;
    border: 2px solid #888;
    width: 700px;
    height: 400px;
    background: black;
    position: relative;
  }

  video, img, iframe {
    width: 100%;
    height: 100%;
  }

  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 10px;
  }

  #seekBar {
    width: 700px;
    margin: 10px auto 0;
    display: block;
  }

  #queue {
    width: 250px;
    height: 400px;
    background: var(--panel);
    border: 2px solid #888;
    overflow-y: auto;
    padding: 10px;
  }

  .queue-item {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    background: rgba(0,0,0,0.1);
  }

  .thumb {
    width: 60px;
    height: 40px;
    object-fit: cover;
    background: #000;
    flex-shrink: 0;
  }

</style>
</head>
<body>
  <div>
    fwwfqgrewgregr
  </div>

<header>
  <input type="file" id="fileInput" multiple />
  <input type="text" id="urlInput" placeholder="Paste video/image/YouTube URL" style="flex:1" />
  <button onclick="loadURL()">Load URL</button>
  <button onclick="toggleDark()">Dark Mode</button>
</header>

<div id="container">
  <div>
    <div id="frame">
      <video id="video" style="display:none"></video>
      <img id="image" style="display:none" />
      <iframe id="yt" style="display:none" frameborder="0" allowfullscreen></iframe>
    </div>
    <input type="range" id="seekBar" value="0" min="0" step="1" />
  </div>

  <div id="queue"></div>
</div>

<div id="controls">
  <button onclick="prevItem()">Prev</button>
  <button onclick="playPause()">Play/Pause</button>
  <button onclick="back10()">-10s</button>
  <button onclick="forward10()">+10s</button>
  <button onclick="nextItem()">Next</button>
  <button onclick="downloadMedia()">Download</button>
</div>

<script>
let video = document.getElementById('video');
let image = document.getElementById('image');
let yt = document.getElementById('yt');
let queue = [];
let currentIndex = -1;
let seekBar = document.getElementById('seekBar');

function resetView() {
  video.style.display = 'none';
  image.style.display = 'none';
  yt.style.display = 'none';
  video.pause();
  yt.src = '';
}

function extractYTId(url) {
  try {
    if (url.includes('youtu.be')) return url.split('/').pop();
    return new URL(url).searchParams.get('v');
  } catch {
    return '';
  }
}

function getThumbnail(item) {
  if (item.type === 'image') return item.url;

  if (item.type === 'yt') {
    const id = extractYTId(item.raw || item.url);
    return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
  }

  if (item.thumb) return item.thumb;
  return '';
}

function addToQueue(item) {
  queue.push(item);
  renderQueue();
}

function renderQueue() {
  const q = document.getElementById('queue');
  q.innerHTML = '';

  queue.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'queue-item';

    const img = document.createElement('img');
    img.className = 'thumb';
    img.src = getThumbnail(item);

    const label = document.createElement('div');
    label.textContent = item.name || 'Media';

    div.appendChild(img);
    div.appendChild(label);

    div.onclick = () => playFromQueue(i);
    q.appendChild(div);
  });
}

function playFromQueue(i) {
  currentIndex = i;
  loadItem(queue[i]);
}

function loadItem(item) {
  resetView();

  if (item.type === 'video') {
    video.src = item.url;
    video.style.display = 'block';
    video.play();

    video.onloadedmetadata = () => {
      seekBar.max = video.duration;
    };

    video.ontimeupdate = () => {
      seekBar.value = video.currentTime;
    };

  } else if (item.type === 'image') {
    image.src = item.url;
    image.style.display = 'block';

  } else if (item.type === 'yt') {
    yt.src = item.url;
    yt.style.display = 'block';
  }
}

seekBar.oninput = () => {
  if (video.style.display === 'block') {
    video.currentTime = seekBar.value;
  }
};

function nextItem() {
  if (currentIndex < queue.length - 1) {
    playFromQueue(currentIndex + 1);
  }
}

function prevItem() {
  if (currentIndex > 0) {
    playFromQueue(currentIndex - 1);
  }
}

// File input
 document.getElementById('fileInput').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);

  files.forEach(file => {
    const url = URL.createObjectURL(file);

    if (file.type.startsWith('video')) {
      // temporary thumb from video (lazy)
      addToQueue({ type: 'video', url, name: file.name, raw: file.name });
    } else if (file.type.startsWith('image')) {
      addToQueue({ type: 'image', url, name: file.name });
    }
  });

  if (queue.length && currentIndex === -1) {
    playFromQueue(0);
  }
});

function loadURL() {
  const url = document.getElementById('urlInput').value;
  if (!url) return;

  if (url.includes('youtube.com') || url.includes('youtu.be')) {
    const id = extractYTId(url);
    addToQueue({ type: 'yt', url: `https://www.youtube.com/embed/${id}`, name: url, raw: url });

  } else if (url.match(/\.(mp4|mov|webm)/i)) {
    addToQueue({ type: 'video', url, name: url });

  } else if (url.match(/\.(png|jpg|jpeg|gif)/i)) {
    addToQueue({ type: 'image', url, name: url });
  }

  if (currentIndex === -1) playFromQueue(0);
}

function playPause() {
  if (video.style.display === 'block') {
    if (video.paused) video.play();
    else video.pause();
  }
}

function back10() {
  if (video.style.display === 'block') video.currentTime = Math.max(0, video.currentTime - 10);
}

function forward10() {
  if (video.style.display === 'block') video.currentTime += 10;
}

function downloadMedia() {
  if (video.style.display === 'block') {
    const a = document.createElement('a');
    a.href = video.src;
    a.download = 'video';
    a.click();
  } else if (image.style.display === 'block') {
    const a = document.createElement('a');
    a.href = image.src;
    a.download = 'image';
    a.click();
  }
}

function toggleDark() {
  document.body.classList.toggle('dark');
}
</script>

</body>
</html>
